# Codemagic configuration for TaskFlow Windows build
workflows:
  windows-build:
    name: TaskFlow Windows Build
    environment:
      flutter: stable
    scripts:
      - name: Setup Flutter for Windows
        script: |
          flutter config --enable-windows
          flutter --version
      - name: Install dependencies
        script: flutter pub get
      - name: Build Windows Release
        script: flutter build windows --release
    artifacts:
      - build/windows/runner/Release/**/*
    publishing:
      email:
        notify:
          success: true
          failure: true
        recipients:
          - your-email@example.com  # Replace with your email if needed
