# Codemagic configuration for TaskFlow Windows build
workflows:
  windows-build:
    name: TaskFlow Windows Build
    environment:
      flutter: stable
    scripts:
      - name: Setup
        script: |
          flutter config --enable-windows
          flutter doctor
      - name: Fix dependencies
        script: |
          # Fix intl version before installing dependencies
          (Get-Content pubspec.yaml) -replace 'intl: \^0\.20\.2', 'intl: 0.19.0' | Set-Content pubspec.yaml
          Write-Host "✅ Dependencies fixed"
      - name: Install dependencies
        script: flutter pub get
      - name: Build Windows Release
        script: flutter build windows --release
    artifacts:
      - build/windows/runner/Release/**/*
