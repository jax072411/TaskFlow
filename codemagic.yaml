# Codemagic configuration for TaskFlow Windows build
workflows:
  windows-build:
    name: TaskFlow Windows Build
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Enable Windows support
        script: |
          flutter config --enable-windows
      - name: Install dependencies
        script: flutter pub get
      - name: Fix intl dependency (PowerShell)
        script: |
          # Fix intl version conflict using PowerShell
          (Get-Content pubspec.yaml) -replace 'intl: \^0\.20\.2', 'intl: 0.19.0' | Set-Content pubspec.yaml
          Write-Host "✅ Fixed intl dependency"
          Get-Content pubspec.yaml | Select-String "intl"
      - name: Build Windows Release
        script: flutter build windows --release
    artifacts:
      - build/windows/runner/Release/**/*
    publishing:
      email:
        notify:
          success: true
          failure: true
        recipients:
          - your-email@example.com
