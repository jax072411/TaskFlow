# Codemagic configuration for TaskFlow Windows build
workflows:
  windows-build:
    name: TaskFlow Windows Build
    environment:
      flutter: 3.29.3  # 指定 Flutter 版本
    scripts:
      - name: Setup Flutter for Windows
        script: |
          flutter config --enable-windows
          flutter --version
      - name: Install dependencies
        script: flutter pub get
      - name: Build Windows Release
        script: flutter build windows --release
    artifacts:
      - build/windows/runner/Release/**/*
