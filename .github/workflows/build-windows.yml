name: Build Windows Release

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:  # Allow manual trigger

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
        flutter-version: '3.29.3'

    - name: Fix dependencies
      run: |
        # Fix intl version conflict
        (Get-Content pubspec.yaml) -replace 'intl: \^0\.20\.2', 'intl: 0.19.0' | Set-Content pubspec.yaml
        Write-Host "✅ Dependencies fixed successfully"

    - name: Install dependencies
      run: flutter pub get
      timeout-minutes: 10

    - name: Build Windows Release
      run: flutter build windows --release
      timeout-minutes: 45

    - name: List build directory contents
      run: |
        Write-Host "=== Build Directory Contents ==="
        if (Test-Path "build") {
          Get-ChildItem -Recurse "build" -ErrorAction SilentlyContinue | Where-Object { $_.Name -like "*.exe" -or $_.Name -like "*.dll" } | Select-Object -First 30 | Format-Table FullName, Length
        } else {
          Write-Host "❌ Build directory not found"
        }

    - name: Find TaskFlow.exe
      run: |
        Write-Host "=== Searching for TaskFlow.exe ==="
        $exePath = "build/windows/runner/Release/TaskFlow.exe"
        if (Test-Path $exePath) {
          Write-Host "✅ Found at expected location: $exePath"
          $file = Get-Item $exePath
          Write-Host "File size: $([math]::Round($file.Length/1MB, 2)) MB"
        } else {
          Write-Host "❌ Not found at expected location"
          Write-Host "Searching recursively..."
          $found = Get-ChildItem -Recurse -Filter "TaskFlow.exe" -ErrorAction SilentlyContinue
          if ($found) {
            Write-Host "✅ Found TaskFlow.exe:"
            $found | Format-Table FullName, Length
          } else {
            Write-Host "❌ TaskFlow.exe not found anywhere"
            Write-Host "Searching for any .exe files..."
            $allExes = Get-ChildItem -Recurse -Filter "*.exe" "build" -ErrorAction SilentlyContinue
            if ($allExes) {
              Write-Host "Found .exe files:"
              $allExes | Format-Table FullName, Length
            } else {
              Write-Host "❌ No .exe files found in build directory"
              Write-Host "Checking if build directory exists..."
              if (Test-Path "build") {
                Write-Host "Build directory exists but is empty or has no .exe files"
                Get-ChildItem "build" -ErrorAction SilentlyContinue | Format-Table
              } else {
                Write-Host "❌ Build directory does not exist"
              }
            }
          }
        }

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: taskflow-windows
        path: |
          build/windows/runner/Release/TaskFlow.exe
          build/windows/runner/Release/*.dll
        retention-days: 7
