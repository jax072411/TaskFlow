name: Build Windows Release

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:  # Allow manual trigger

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
        flutter-version: '3.29.3'

    - name: Cache Flutter dependencies
      uses: actions/cache@v3
      with:
        path: |
          ~/.pub-cache
          **/.packages
          **/.flutter-plugins
          **/.flutter-plugins-dependencies
        key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
        restore-keys: |
          ${{ runner.os }}-pub-

    - name: Fix dependencies
      run: |
        # Fix intl version conflict
        (Get-Content pubspec.yaml) -replace 'intl: \^0\.20\.2', 'intl: 0.19.0' | Set-Content pubspec.yaml
        Write-Host "✅ Dependencies fixed successfully"

    - name: Install dependencies
      run: flutter pub get
      timeout-minutes: 10

    - name: Build Windows Release
      run: flutter build windows --release
      timeout-minutes: 30

    - name: Check build directory
      run: |
        Write-Host "Checking build directory..."
        if (Test-Path "build/windows/runner/Release") {
          Write-Host "✅ Release directory exists"
          Get-ChildItem "build/windows/runner/Release" | Format-Table Name, Length
        } else {
          Write-Host "❌ Release directory not found"
          Write-Host "Checking build directory structure..."
          Get-ChildItem -Recurse "build" | Format-Table FullName
        }

    - name: Verify build output
      run: |
        $exePath = "build/windows/runner/Release/TaskFlow.exe"
        if (Test-Path $exePath) {
          Write-Host "✅ Build successful: TaskFlow.exe found"
          $file = Get-Item $exePath
          Write-Host "File size: $([math]::Round($file.Length/1MB, 2)) MB"
        } else {
          Write-Host "❌ Build failed: TaskFlow.exe not found"
          Write-Host "Searching for any .exe files..."
          Get-ChildItem -Recurse -Filter "*.exe" "build" | Format-Table FullName, Length
          exit 1
        }

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: taskflow-windows
        path: |
          build/windows/runner/Release/*.exe
          build/windows/runner/Release/*.dll
          build/windows/runner/Release/*.json
        retention-days: 7
