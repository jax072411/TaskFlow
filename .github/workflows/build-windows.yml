name: Build Windows Release

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:  # Allow manual trigger

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
        flutter-version: '3.29.3'

    - name: Fix dependencies
      run: |
        # Fix intl version conflict as done locally
        (Get-Content pubspec.yaml) -replace 'intl: \^0\.20\.2', 'intl: 0.19.0' | Set-Content pubspec.yaml
        Write-Host "Dependencies fixed successfully"

    - name: Install dependencies
      run: flutter pub get

    - name: Build Windows Release
      run: flutter build windows --release
      timeout-minutes: 30

    - name: Verify build output
      run: |
        if (Test-Path "build/windows/runner/Release/TaskFlow.exe") {
          Write-Host "✅ Build successful: TaskFlow.exe found"
        } else {
          Write-Host "❌ Build failed: TaskFlow.exe not found"
          exit 1
        }

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: taskflow-windows
        path: |
          build/windows/runner/Release/*.exe
          build/windows/runner/Release/*.dll
          build/windows/runner/Release/*.json
        retention-days: 7
