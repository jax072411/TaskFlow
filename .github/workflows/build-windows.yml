name: Build Windows Release

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:  # Allow manual trigger

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
        flutter-version: '3.29.3'

    - name: Enable Developer Mode (required for symlinks)
      run: |
        # Try to enable Developer Mode via registry
        reg add "HKEY_LOCAL_MACHINE\SOFTWARE\Microsoft\Windows\CurrentVersion\AppModelUnlock" /v AllowDevelopmentWithoutDevLicense /t REG_DWORD /d 1 /f
        Write-Host "✅ Developer mode enabled via registry"

    - name: Cache Flutter dependencies
      uses: actions/cache@v3
      with:
        path: |
          ~/.pub-cache
          **/.packages
          **/.flutter-plugins
          **/.flutter-plugins-dependencies
        key: ${{ runner.os }}-pub-${{ hashFiles('**/pubspec.lock') }}
        restore-keys: |
          ${{ runner.os }}-pub-

    - name: Fix dependencies
      run: |
        # Fix intl version conflict
        (Get-Content pubspec.yaml) -replace 'intl: \^0\.20\.2', 'intl: 0.19.0' | Set-Content pubspec.yaml
        Write-Host "✅ Dependencies fixed successfully"

    - name: Install dependencies
      run: flutter pub get
      timeout-minutes: 10

    - name: Build Windows Release
      run: flutter build windows --release
      timeout-minutes: 45

    - name: Check build output
      run: |
        Write-Host "Checking build directory structure..."
        if (Test-Path "build/windows/runner/Release") {
          Write-Host "✅ Release directory exists"
          Get-ChildItem "build/windows/runner/Release" | Format-Table Name, Length
        } else {
          Write-Host "❌ Release directory not found"
          Write-Host "Checking for other directories..."
          if (Test-Path "build/windows/runner") {
            Get-ChildItem "build/windows/runner" | Format-Table
          }
          if (Test-Path "build/windows") {
            Get-ChildItem "build/windows" | Format-Table
          }
          if (Test-Path "build") {
            Get-ChildItem "build" | Format-Table
          }
        }

    - name: Verify TaskFlow.exe
      run: |
        $exePath = "build/windows/runner/Release/TaskFlow.exe"
        if (Test-Path $exePath) {
          $file = Get-Item $exePath
          Write-Host "✅ Build successful!"
          Write-Host "TaskFlow.exe found: $exePath"
          Write-Host "File size: $([math]::Round($file.Length/1MB, 2)) MB"
        } else {
          Write-Host "❌ TaskFlow.exe not found at expected location"
          Write-Host "Searching for any .exe files in build directory..."
          $exeFiles = Get-ChildItem -Recurse -Filter "*.exe" "build" -ErrorAction SilentlyContinue
          if ($exeFiles) {
            Write-Host "Found .exe files:"
            $exeFiles | Format-Table FullName, Length
            # Check if any of them might be TaskFlow
            foreach ($exe in $exeFiles) {
              if ($exe.Name -like "*taskflow*" -or $exe.Name -like "*TaskFlow*") {
                Write-Host "✅ Found TaskFlow executable: $($exe.FullName)"
                Write-Host "Copying to expected location..."
                New-Item -ItemType Directory -Force -Path "build/windows/runner/Release" | Out-Null
                Copy-Item $exe.FullName "build/windows/runner/Release/TaskFlow.exe"
                break
              }
            }
          } else {
            Write-Host "❌ No .exe files found in build directory"
          }
        }

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: taskflow-windows
        path: |
          build/windows/runner/Release/*.exe
          build/windows/runner/Release/*.dll
          build/windows/runner/Release/*.json
        retention-days: 7
