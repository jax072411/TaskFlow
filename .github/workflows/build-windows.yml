name: Build Windows Release

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        channel: 'stable'
        flutter-version: '3.29.3'

    - name: Fix dependencies
      run: |
        (Get-Content pubspec.yaml) -replace 'intl: \^0\.20\.2', 'intl: 0.19.0' | Set-Content pubspec.yaml
        Write-Host "✅ Dependencies fixed"

    - name: Install dependencies
      run: flutter pub get

    - name: Build Windows Release
      run: flutter build windows --release
      timeout-minutes: 45

    - name: Debug - List build directory
      run: |
        Write-Host "=== Build Directory Tree ==="
        if (Test-Path "build") {
          Get-ChildItem -Recurse "build" -ErrorAction SilentlyContinue | Where-Object { $_.PSIsContainer -eq $false } | Select-Object -First 50 | Format-Table FullName, Length
        } else {
          Write-Host "Build directory does not exist"
        }

    - name: Find and copy TaskFlow.exe
      run: |
        Write-Host "=== Searching for TaskFlow.exe ==="

        # Check expected location
        $expectedPath = "build/windows/runner/Release/TaskFlow.exe"
        if (Test-Path $expectedPath) {
          Write-Host "✅ Found TaskFlow.exe at: $expectedPath"
          $file = Get-Item $expectedPath
          Write-Host "File size: $([math]::Round($file.Length/1MB, 2)) MB"
        } else {
          Write-Host "❌ Not found at: $expectedPath"

          # Search recursively
          Write-Host "Searching recursively..."
          $foundFiles = Get-ChildItem -Recurse -Filter "TaskFlow.exe" -ErrorAction SilentlyContinue
          if ($foundFiles) {
            Write-Host "✅ Found TaskFlow.exe:"
            foreach ($f in $foundFiles) {
              Write-Host "  - $($f.FullName) ($([math]::Round($f.Length/1KB, 1)) KB)"
            }
            # Copy to expected location
            $source = $foundFiles[0].FullName
            $destDir = "build/windows/runner/Release"
            New-Item -ItemType Directory -Force -Path $destDir | Out-Null
            Copy-Item $source "$destDir/TaskFlow.exe"
            Write-Host "✅ Copied to: $destDir/TaskFlow.exe"
          } else {
            Write-Host "❌ TaskFlow.exe not found anywhere"
            # List all .exe files
            Write-Host "All .exe files in build:"
            Get-ChildItem -Recurse -Filter "*.exe" "build" -ErrorAction SilentlyContinue | Format-Table FullName, Length
          }
        }

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: taskflow-windows
        path: |
          build/windows/runner/Release/TaskFlow.exe
          build/windows/runner/Release/*.dll
        retention-days: 7
        if-no-files-found: warn
